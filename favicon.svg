<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <style>
      /* Default colors for Dark Mode tabs (white and orange) */
      .brand-white { fill: #FFFFFF; transition: fill 0.3s ease; }
      .brand-orange { fill: #FF9F1C; }
      
      /* Adaptive styling: If the user's browser is in Light Mode, 
         change the white elements to dark gray so they don't blend into the tab */
